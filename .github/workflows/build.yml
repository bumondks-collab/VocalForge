name: Build Vocal Factory

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps/juce-src
          key: juce-8.0.4-macos
          restore-keys: juce-8.0.4-macos-

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: VocalFactory-VST3-macOS
          path: build/**/VST3/**
          if-no-files-found: warn

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: VocalFactory-Standalone-macOS
          path: build/**/Standalone/**
          if-no-files-found: warn

  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps/juce-src
          key: juce-8.0.4-windows-x64
          restore-keys: juce-8.0.4-windows-

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: VocalFactory-VST3-Windows
          path: build/**/VST3/**
          if-no-files-found: warn

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: VocalFactory-Standalone-Windows
          path: build/**/Standalone/**
          if-no-files-found: warn
